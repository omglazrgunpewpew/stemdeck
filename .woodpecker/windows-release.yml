when:
  - event: release
  - event: tag

labels:
  platform: windows/amd64
  backend: local

steps:
  write-version:
    image: powershell
    commands:
      - |
        $tag = $env:CI_COMMIT_TAG
        if (-not $tag) { throw "CI_COMMIT_TAG is not set" }
        $version = $tag -replace '^v', ''
        $json = "{`"version`": `"$version`"}"
        Set-Content -Path "static/version.json" -Value $json -Encoding UTF8
        (Get-Content "desktop/src-tauri/Cargo.toml") -replace '^version = ".*"', "version = `"$version`"" |
          Set-Content "desktop/src-tauri/Cargo.toml"
        (Get-Content "desktop/src-tauri/tauri.conf.json") -replace '"version": "[^"]*"', "`"version`": `"$version`"" |
          Set-Content "desktop/src-tauri/tauri.conf.json"
        Write-Host "Wrote version $version to static/version.json, Cargo.toml, tauri.conf.json"

  build-windows-nvidia:
    depends_on:
      - write-version
    image: powershell
    commands:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/windows/make-portable.ps1
          -PackageName StemDeck-Windows-x64.NVIDIA
          -PackageVersion "$env:CI_COMMIT_TAG"
          -StripVenv

  build-windows-cpu:
    image: powershell
    depends_on:
      - build-windows-nvidia
    commands:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/windows/make-portable.ps1
          -PackageName StemDeck-Windows-x64
          -PackageVersion "$env:CI_COMMIT_TAG"
          -CpuOnly
          -StripVenv

  scan-windows-artifacts:
    image: powershell
    depends_on:
      - build-windows-cpu
    commands:
      - |
        Write-Host "Preparing ClamAV scan for Windows release artifacts..."
        Write-Host "Artifacts staged in: $PWD\dist"
        Get-ChildItem -Path "dist" -File |
          Sort-Object Name |
          Select-Object Name,
            @{Name="SizeMB"; Expression={ [math]::Round($_.Length / 1MB, 2) }} |
          Format-Table -AutoSize

        Write-Host "SHA256 checksums:"
        Get-ChildItem -Path "dist" -Filter "*.zip" -File |
          Sort-Object Name |
          ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 $_.FullName
            Write-Host "  $($hash.Hash)  $($_.Name)"
          }

        Write-Host "Pulling latest ClamAV scanner image..."
        docker pull clamav/clamav:latest

        Write-Host "Running ClamAV scan over dist/..."
        docker run --rm -v "${PWD}/dist:/scan:ro" clamav/clamav:latest `
          clamscan --recursive --infected --bell /scan
        if ($LASTEXITCODE -ne 0) {
          throw "ClamAV scan failed or reported infected files. Exit code: $LASTEXITCODE"
        }
        Write-Host "ClamAV scan completed successfully. No infected files reported."

  upload-windows-artifacts:
    image: powershell
    when:
      - event: release
    depends_on:
      - scan-windows-artifacts
    environment:
      GH_TOKEN:
        from_secret: github_token
    commands:
      - |
        if (-not $env:CI_COMMIT_TAG) {
          throw "CI_COMMIT_TAG is required to upload a release asset."
        }
      - |
        if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
          throw "GitHub CLI is required on the Windows agent to upload release assets."
        }
      - |
        $scanNote = "Windows portable packages were scanned with ClamAV in CI before upload."
        $bodyRaw = gh release view "$env:CI_COMMIT_TAG" --repo "stemdeckapp/stemdeck" --json body --jq ".body"
        $body = ($bodyRaw -join "`n")
        if ($body -notlike "*$scanNote*") {
          $notesPath = Join-Path $env:TEMP "stemdeck-release-notes.md"
          $updatedBody = ($body.TrimEnd(), "", "### Artifact scan", "", "- $scanNote") -join "`n"
          Set-Content -Path $notesPath -Value $updatedBody -Encoding UTF8
          gh release edit "$env:CI_COMMIT_TAG" --repo "stemdeckapp/stemdeck" --notes-file $notesPath
        }
      - |
        $existing = gh release view "$env:CI_COMMIT_TAG" --repo "stemdeckapp/stemdeck" --json assets --jq '[.assets[].name] | join(" ")'
        if ($existing -like "*StemDeck-Windows-x64.zip*") {
          Write-Host "Windows assets already present for $env:CI_COMMIT_TAG — skipping upload (pre-release promotion)."
          exit 0
        }
        gh release upload "$env:CI_COMMIT_TAG" `
          "dist/StemDeck-Windows-x64.NVIDIA.zip" `
          "dist/StemDeck-Windows-x64.NVIDIA.zip.sha256" `
          "dist/StemDeck-Windows-x64.zip" `
          "dist/StemDeck-Windows-x64.zip.sha256" `
          --repo "stemdeckapp/stemdeck"
